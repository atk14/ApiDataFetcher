name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "5.6"
          - "7.0"
          - "7.1"
          - "7.2"
          - "7.3"
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    name: "PHP ${{ matrix.php }}"

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          tools: composer

      - name: Install privoxy
        run: |
          sudo apt-get install -y privoxy
          sudo service privoxy start 2>&1 || echo "Starting privoxy failed"
          sudo service privoxy status 2>&1 || echo "Failed"
          sudo systemctl status privoxy.service 2>&1 || echo "Failed"

      - name: Install dependencies
        run: composer update --dev

      - name: Run tests
        run: cd test && ../vendor/bin/run_unit_tests

